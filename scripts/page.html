<script>
        $(document).ready(function () {

            if ("" != null && "" != "") {
                var urlRedirect = ;
                if ("alreadysigned" == "alreadysigned" && urlRedirect.AfterSignURL != "") {
                    location.href = urlRedirect.AfterSignURL
                }
                else if ("alreadysigned" == "declined" && urlRedirect.AfterDeclineURL != "") {
                    location.href = urlRedirect.AfterDeclineURL
                }
            }

            if ($('#modal-loader').hasClass('in')) {
                $('#modal-loader').modal('hide');
            }

            var langByRoute = getLangByRoute();

            if (langByRoute == "he") {

                var oldSrc = $('#logo-2sign').attr('src');
                var newSrc = '/Assets/logo-he.svg';
                $('img[src="' + oldSrc + '"]').attr('src', newSrc);

            }
            else {

                var oldSrc = $('#logo-2sign').attr('src');
                var newSrc = '/Assets/logo-en.svg';
                $('img[src="' + oldSrc + '"]').attr('src', newSrc);
            }
        });

        function getLangByRoute() {
            if (location.href.indexOf("/en/") > -1) {
                return "en";
            }
            else if (location.href.indexOf("/he/") > -1) {
                return "he";
            }
            else if (location.href.indexOf("/ru/") > -1) {
                return "ru";
            }
            else if (location.href.indexOf("/ar/") > -1) {
                return "ar";
            }
            else {
                return "he";
            }
        }

</script>
